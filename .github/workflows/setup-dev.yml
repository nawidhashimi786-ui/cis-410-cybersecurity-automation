name: "Setup — Dev Server"

on:
  workflow_dispatch:

jobs:
  setup:
    name: "Install Docker on Dev VM"
    runs-on: self-hosted

    steps:

      - name: Configure passwordless sudo
        run: |
          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} \
            "echo '${{ secrets.DEV_USER }} ALL=(ALL) NOPASSWD:ALL' | sudo tee /etc/sudoers.d/${{ secrets.DEV_USER }}"

          rm /tmp/deploy_key


      - name: Install Docker on Dev VM
        run: |
          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} << 'EOF'
          set -e
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh
          sudo usermod -aG docker $(whoami)
          sudo mkdir -p /opt/app
          sudo chown $(whoami):$(whoami) /opt/app
          rm get-docker.sh
          EOF

          rm /tmp/deploy_key


      - name: Verify Docker
        run: |
          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }} << 'EOF'
          docker --version
          docker compose version
          ls -la /opt/app
          EOF

          rm /tmp/deploy_key
